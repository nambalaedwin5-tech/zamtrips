<!DOCTYPE html>
<html>
<head>
    <title>Booking Confirmed - ZamTrips</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding-top: 100px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: green;
        }
        p {
            font-size: 18px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background-color: #2a7ae2;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
        }
        a:hover {
            background-color: #1f5bb5;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>✅ Booking Successful!</h1>
    <p>Thank you <strong>{{ name }}</strong></p>
    <p>Your trip to <strong>{{ destination }}</strong></p>
    <p>on <strong>{{ date }}</strong> has been booked.</p>

    <a href="/">🏠 Back Home</a>
    <br><br>
    <a href="/bookings">📋 View Bookings</a>
</div>

</body>
</html>
